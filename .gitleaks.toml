# Gitleaks configuration — shared by the GitHub Actions workflow and the
# local pre-commit hook so both environments enforce identical rules.
#
# Docs: https://github.com/zricethezav/gitleaks/blob/master/config/gitleaks.toml

title = "ffc secret scanner action"

# ---------------------------------------------------------------------------
# Extend the default ruleset shipped with gitleaks so we inherit all the
# built-in detectors (AWS keys, GitHub tokens, generic high-entropy strings,
# etc.) and only need to declare project-specific additions below.
# ---------------------------------------------------------------------------
[extend]
useDefault = true

# ---------------------------------------------------------------------------
# Project-specific rules
# Add deny rules here for patterns specific to this service that the default
# ruleset would not already catch.
# ---------------------------------------------------------------------------

# Example: Azure client secrets (adjust the prefix/pattern to match your
# actual format once you know it).
[[rules]]
id          = "azure-client-secret"
description = "Azure client secret"
regex       = '''(?i)azure[_\-]?client[_\-]?secret[\s\S]{0,20}[=:]\s*["']?([a-zA-Z0-9+/~._-]{32,})'''
tags        = ["azure", "secret"]

# Example: catch raw connection strings that include a password component.
[[rules]]
id          = "db-connection-string"
description = "Database connection string with embedded password"
regex       = '''(?i)(postgres|postgresql|mssql|mysql):\/\/[^:]+:[^@]{8,}@'''
tags        = ["database", "secret"]

# ---------------------------------------------------------------------------
# Allow-list — entries here are NEVER flagged, regardless of matching rules.
#
# Guidelines:
#  - Add an entry only for well-understood test/mock values.
#  - Include a comment explaining WHY the value is safe to allow.
#  - Prefer allowing by file path rather than by regex where possible so the
#    noise surface is as small as possible.
# ---------------------------------------------------------------------------

[allowlist]
description = "Known-safe test values and intentional mock data"

# Specific commits that contain only test/fixture data (replace with real SHA).
# commits = ["<commit-sha>"]

# Files that are allowed to contain secret-like patterns (e.g. unit test
# fixtures, mock objects).  Add only what is genuinely safe.
paths = [
  # Jest snapshot or mock-object files are populated with fake tokens.
  '''test/mock-objects/.*''',
  '''test/mock-modules/.*''',
]

# Individual regex patterns that should never be flagged, regardless of file.
# Each entry should be as specific as possible — prefer an exact literal over
# a broad pattern.
#
# Example (uncomment and adjust for your real test token):
# regexes = [
#   # FFC test token — not a live credential, used only in unit tests.
#   '''TEST_TOKEN_REPLACE_WITH_ACTUAL_VALUE''',
# ]
