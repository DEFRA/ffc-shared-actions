name: Version and release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  version-check:
    name: Ensure VERSION is bumped
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION file has changed
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^VERSION$'; then
            echo "VERSION file has been updated."
          else
            echo "::error::VERSION file has not been changed. Please bump the version in the VERSION file before merging."
            exit 1
          fi

  release:
    name: Tag and release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if tag already exists
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump the version in the VERSION file."
          exit 1

      - name: Create tag and GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
