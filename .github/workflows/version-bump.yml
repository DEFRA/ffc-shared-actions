name: Reusable Version Bump

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '24'
      target-branch:
        description: 'Target branch for version bump'
        required: false
        type: string
        default: 'main'
    secrets:
      GPG_PRIVATE_KEY:
        description: 'GPG private key for signing commits'
        required: true
      GPG_KEY_ID:
        description: 'GPG key ID for signing'
        required: true
      GPG_EMAIL:
        description: 'Email associated with GPG key'
        required: true
      GPG_NAME:
        description: 'Name associated with GPG key'
        required: true
      GITHUB_TOKEN:
        description: 'GitHub token for pushing changes'
        required: true

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Set up GPG keys for signing
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          git config --global user.signingkey ${{ secrets.GPG_KEY_ID }}
          git config --global commit.gpgsign true
          git config --global user.email ${{ secrets.GPG_EMAIL }}
          git config --global user.name ${{ secrets.GPG_NAME }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Determine if version bump is needed
        id: version-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Prefer the latest GitHub release; fall back to the latest git tag
          LATEST_TAG=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=$(git tag --sort=-version:refname | head -1)
          fi

          # If nothing exists yet, treat baseline as 0.0.0
          LATEST_VERSION="${LATEST_TAG#v}"
          LATEST_VERSION="${LATEST_VERSION:-0.0.0}"

          CURRENT_VERSION=$(node -p "require('./package.json').version")

          echo "Latest released version: $LATEST_VERSION"
          echo "Current package.json version: $CURRENT_VERSION"

          # Only bump if the current version is not already strictly ahead
          NEEDS_BUMP=$(node -e "
            const [cm, cn, cp] = '$CURRENT_VERSION'.split('.').map(Number);
            const [lm, ln, lp] = '$LATEST_VERSION'.split('.').map(Number);
            const ahead = cm > lm || (cm === lm && cn > ln) || (cm === lm && cn === ln && cp > lp);
            console.log(ahead ? 'false' : 'true');
          ")

          echo "needs_bump=$NEEDS_BUMP" >> $GITHUB_OUTPUT

      - name: Bump patch version
        if: steps.version-check.outputs.needs_bump == 'true'
        run: npm version patch --no-git-tag-version

      - name: Commit and push version bump
        if: steps.version-check.outputs.needs_bump == 'true'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -S -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git push origin "$HEAD_REF"
