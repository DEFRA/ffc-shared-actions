name: Reusable Version Bump

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '24'
      target-branch:
        description: 'Target branch for version bump'
        required: false
        type: string
        default: 'main'
      use-gpg-keys:
        description: 'Use GPG keys for signing instead of GitHub Actions automatic signing'
        required: false
        type: boolean
        default: false
    secrets:
      GPG_PRIVATE_KEY:
        description: 'Optional GPG private key for commit signing (backup). If not provided, uses GitHub Actions automatic signing'
        required: false
      GPG_KEY_ID:
        description: 'GPG key ID (required only if GPG_PRIVATE_KEY is provided)'
        required: false
      GPG_EMAIL:
        description: 'Email associated with GPG key (required only if GPG_PRIVATE_KEY is provided)'
        required: false
      GPG_NAME:
        description: 'Name associated with GPG key (required only if GPG_PRIVATE_KEY is provided)'
        required: false

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Configure git for signing
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          USE_GPG: ${{ inputs.use-gpg-keys }}
        run: |
          if [ "$USE_GPG" = "true" ] && [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "Configuring GPG keys for commit signing..."
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            git config --global user.signingkey ${{ secrets.GPG_KEY_ID }}
            git config --global commit.gpgsign true
            git config --global user.email ${{ secrets.GPG_EMAIL }}
            git config --global user.name ${{ secrets.GPG_NAME }}
          else
            echo "Using GitHub Actions automatic commit signing"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git config --global user.name "github-actions[bot]"
          fi

      - name: Determine if version bump is needed
        id: version-check
        run: |
          git fetch origin ${{ inputs.target-branch }} --depth=1

          MAIN_VERSION=$(git show origin/${{ inputs.target-branch }}:package.json | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          echo "Version on ${{ inputs.target-branch }}: $MAIN_VERSION"
          echo "Current PR version: $CURRENT_VERSION"

          NEEDS_BUMP=$(node -e "
            const [cm, cn, cp] = '$CURRENT_VERSION'.split('.').map(Number);
            const [mm, mn, mp] = '$MAIN_VERSION'.split('.').map(Number);
            const ahead = cm > mm || (cm === mm && cn > mn) || (cm === mm && cn === mn && cp > mp);
            console.log(ahead ? 'false' : 'true');
          ")

          echo "needs_bump=$NEEDS_BUMP" >> $GITHUB_OUTPUT

      - name: Bump patch version
        if: steps.version-check.outputs.needs_bump == 'true'
        run: npm version patch --no-git-tag-version

      - name: Commit and push version bump
        if: steps.version-check.outputs.needs_bump == 'true'
        env:
          HEAD_REF: ${{ github.head_ref }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          USE_GPG: ${{ inputs.use-gpg-keys }}
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          if [ "$USE_GPG" = "true" ] && [ -n "$GPG_PRIVATE_KEY" ]; then
            git commit -S -m "chore: bump version to ${NEW_VERSION}"
          else
            git commit -m "chore: bump version to ${NEW_VERSION}"
          fi
          git push origin "$HEAD_REF"