name: Reusable Version Bump

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '24'
      target-branch:
        description: 'Target branch for version bump'
        required: false
        type: string
        default: 'main'


jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Determine if version bump is needed
        id: version-check
        run: |
          git fetch origin ${{ inputs.target-branch }} --depth=1

          MAIN_VERSION=$(git show origin/${{ inputs.target-branch }}:package.json | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          echo "Version on ${{ inputs.target-branch }}: $MAIN_VERSION"
          echo "Current PR version: $CURRENT_VERSION"

          NEEDS_BUMP=$(node -e "
            const [cm, cn, cp] = '$CURRENT_VERSION'.split('.').map(Number);
            const [mm, mn, mp] = '$MAIN_VERSION'.split('.').map(Number);
            const ahead = cm > mm || (cm === mm && cn > mn) || (cm === mm && cn === mn && cp > mp);
            console.log(ahead ? 'false' : 'true');
          ")

          echo "needs_bump=$NEEDS_BUMP" >> $GITHUB_OUTPUT

      - name: Bump patch version
        if: steps.version-check.outputs.needs_bump == 'true'
        run: npm version patch --no-git-tag-version

      - name: Commit and push version bump
        if: steps.version-check.outputs.needs_bump == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const headRef = context.payload.pull_request.head.ref;

            const { data: refData } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${headRef}`,
            });
            const currentSha = refData.object.sha;

            const { data: commitData } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: currentSha,
            });

            const packageJson = fs.readFileSync('./package.json', 'utf8');
            const packageLock = fs.readFileSync('./package-lock.json', 'utf8');
            const newVersion = JSON.parse(packageJson).version;

            const [pjBlob, plBlob] = await Promise.all([
              github.rest.git.createBlob({ owner: context.repo.owner, repo: context.repo.repo, content: packageJson, encoding: 'utf-8' }),
              github.rest.git.createBlob({ owner: context.repo.owner, repo: context.repo.repo, content: packageLock, encoding: 'utf-8' }),
            ]);

            const { data: tree } = await github.rest.git.createTree({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base_tree: commitData.tree.sha,
              tree: [
                { path: 'package.json', mode: '100644', type: 'blob', sha: pjBlob.data.sha },
                { path: 'package-lock.json', mode: '100644', type: 'blob', sha: plBlob.data.sha },
              ],
            });

            const { data: newCommit } = await github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: `chore: bump version to ${newVersion}`,
              tree: tree.sha,
              parents: [currentSha],
            });

            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${headRef}`,
              sha: newCommit.sha,
            });

            core.info(`Successfully bumped version to ${newVersion}`);