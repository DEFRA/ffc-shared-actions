name: Secret Scanner

on:
  workflow_call:
    # No inputs required — gitleaks reads .gitleaks.toml from the calling repo

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --exit-code=2 \
            --log-opts="--no-merges --first-parent"