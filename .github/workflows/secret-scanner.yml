name: Secret Scanner

on:
  workflow_call:
    # No inputs required — gitleaks reads .gitleaks.toml from the calling repo

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect secrets
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.0"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Checkout shared gitleaks config
        uses: actions/checkout@v4
        with:
          repository: DEFRA/ffc-shared-actions
          path: .gitleaks-shared
          sparse-checkout: .gitleaks.toml

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --gitleaks-ignore-path .gitleaksignore \
            --report-path findings.json \
            --redact \
            --verbose \
            --exit-code=2