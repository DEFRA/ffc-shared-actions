name: Secret Scanner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened        # PR created
      - synchronize   # new commits pushed to an existing PR
      - reopened      # PR reopened after being closed

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can diff every commit in the push/PR
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_LICENSE: "dummyLicense"  # dummy for now, license not needed, only placeholder
