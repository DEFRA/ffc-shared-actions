name: Shared Action Versioning

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  version-check:
    name: Ensure VERSION number is bumped
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure VERSION is ahead (auto-bump if needed)
        env:
          HEAD_REF: ${{ github.head_ref }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' VERSION | head -1 || true)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "::error::VERSION file must contain a semantic version like 1.2.3"
            exit 1
          fi

          LATEST_TAG=$(git tag --sort=-version:refname | head -1 || true)
          LATEST_VERSION="${LATEST_TAG#v}"
          LATEST_VERSION="${LATEST_VERSION:-0.0.0}"

          echo "Current VERSION: $CURRENT_VERSION"
          echo "Latest repo version: $LATEST_VERSION"

          HIGHEST=$(printf '%s\n%s\n' "$CURRENT_VERSION" "$LATEST_VERSION" | sort -V | tail -1)
          if [ "$CURRENT_VERSION" = "$HIGHEST" ] && [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "VERSION is already ahead. No change needed."
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Auto-bumping VERSION to: $NEXT_VERSION"

          awk -v new="$NEXT_VERSION" '
            BEGIN { replaced=0 }
            {
              if (!replaced && $0 !~ /^[[:space:]]*#/ && $0 !~ /^[[:space:]]*$/) {
                print new
                replaced=1
                next
              }
              print
            }
            END {
              if (!replaced) print new
            }
          ' VERSION > VERSION.tmp
          mv VERSION.tmp VERSION

          if [ "$IS_FORK" = "true" ]; then
            echo "::error::PR is from a fork; cannot push auto-bump. Please set VERSION to > $LATEST_VERSION manually."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump VERSION to ${NEXT_VERSION}" || {
            echo "No changes to commit."
            exit 0
          }
          git push origin "HEAD:${HEAD_REF}"

  release:
    name: Tag and release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -v '^\s*#' VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if tag already exists
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump the version in the VERSION file."
          exit 1

      - name: Create tag and GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
