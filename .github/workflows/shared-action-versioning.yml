name: Shared Action Versioning

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  version-check:
    name: Ensure VERSION number is bumped
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure VERSION is ahead (auto-bump if needed)
        id: version-check
        env:
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' VERSION | head -1 || true)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "::error::VERSION file must contain a semantic version like 1.2.3"
            exit 1
          fi

          LATEST_TAG=$(git tag --sort=-version:refname | head -1 || true)
          LATEST_VERSION="${LATEST_TAG#v}"
          LATEST_VERSION="${LATEST_VERSION:-0.0.0}"

          echo "Current VERSION: $CURRENT_VERSION"
          echo "Latest repo version: $LATEST_VERSION"

          HIGHEST=$(printf '%s\n%s\n' "$CURRENT_VERSION" "$LATEST_VERSION" | sort -V | tail -1)
          if [ "$CURRENT_VERSION" = "$HIGHEST" ] && [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "VERSION is already ahead. No change needed."
            echo "bumped=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$IS_FORK" = "true" ]; then
            echo "::error::PR is from a fork; cannot push auto-bump. Please set VERSION to > $LATEST_VERSION manually."
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Auto-bumping VERSION to: $NEXT_VERSION"

          awk -v new="$NEXT_VERSION" '
            BEGIN { replaced=0 }
            {
              if (!replaced && $0 !~ /^[[:space:]]*#/ && $0 !~ /^[[:space:]]*$/) {
                print new
                replaced=1
                next
              }
              print
            }
            END {
              if (!replaced) print new
            }
          ' VERSION > VERSION.tmp
          mv VERSION.tmp VERSION

          echo "bumped=true" >> $GITHUB_OUTPUT
          echo "next_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit VERSION bump
        if: steps.version-check.outputs.bumped == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const headRef = context.payload.pull_request.head.ref;
            const nextVersion = '${{ steps.version-check.outputs.next_version }}';

            const { data: refData } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${headRef}`,
            });
            const currentSha = refData.object.sha;

            const { data: commitData } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: currentSha,
            });

            const versionContent = fs.readFileSync('./VERSION', 'utf8');

            const { data: blob } = await github.rest.git.createBlob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              content: versionContent,
              encoding: 'utf-8',
            });

            const { data: tree } = await github.rest.git.createTree({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base_tree: commitData.tree.sha,
              tree: [
                { path: 'VERSION', mode: '100644', type: 'blob', sha: blob.sha },
              ],
            });

            const { data: newCommit } = await github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: `chore: bump VERSION to ${nextVersion}`,
              tree: tree.sha,
              parents: [currentSha],
            });

            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${headRef}`,
              sha: newCommit.sha,
            });

            core.info(`Successfully bumped VERSION to ${nextVersion}`);

  release:
    name: Tag and release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -v '^\s*#' VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if tag already exists
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump the version in the VERSION file."
          exit 1

      - name: Create tag and GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
